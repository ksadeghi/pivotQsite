<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<style>
	html {
		overflow: hidden;
	}

	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
 	}

 	iframe {
 		max-width: 100%;
 	}
</style>
</head>
	<body><code></code><!-- Our Promise — Dark Background Title + Ferrari Red Streak (INLINE / Hostinger-safe / DM Sans) -->
<section style="
  background:transparent !important;
  width:100%;
  padding:22px 12px 14px;
  box-sizing:border-box;
  font-family:'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
">
  <div style="max-width:1120px; margin:0 auto; padding-left:0px;">
    <!-- Title (white) — increased ~30% -->
    <h1 style="
      margin:0;
      font-size:clamp(29px, 6.2vw, 42px);
      line-height:1.12;
      letter-spacing:-0.02em;
      color:rgba(255,255,255,.92);
    ">
      Our Promise
    </h1>

    <!-- Ferrari red streak -->
    <div style="
      width:min(640px, 92vw);
      height:4px;
      margin-top:12px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(255,40,0,.98), rgba(255,40,0,.98), rgba(255,40,0,.36), rgba(255,40,0,0));
      box-shadow:0 0 0 1px rgba(255,40,0,.10);
    "></div>
  </div>
</section>

<script>
	const heightObserver = new ResizeObserver(([{ contentRect }]) => {
		window.parent.postMessage({ action: 'iframeHeightUpdated', height: contentRect.height, id: 'z4gPcP' }, '*');
	});

	heightObserver.observe(document.documentElement);
</script>

</body></html>
