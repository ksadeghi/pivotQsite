<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<style>
	html {
		overflow: hidden;
	}

	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
 	}

 	iframe {
 		max-width: 100%;
 	}
</style>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap');

  .piv-sec-title-d{
    --piv-red:#FF2800;
    --piv-text: rgba(255,255,255,.92);
    --piv-sub:  rgba(255,255,255,.82);

    background: transparent !important;
    width: 100%;
    padding: 44px 16px 26px; /* ✅ UPDATED */
    font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    color: var(--piv-text);
    box-sizing: border-box;
  }
  .piv-sec-title-d, .piv-sec-title-d *{ box-sizing: border-box; }

  .piv-sec-title-d__wrap{
    max-width: 1040px;
    margin: 0 auto;
    text-align: center;
    position: relative;
    padding: 0 8px;
  }

  /* Subtle “spotlight” behind the heading */
  .piv-sec-title-d__wrap::before{
    content:"";
    position:absolute;
    left:50%;
    top:-20px;
    transform: translateX(-50%);
    width: min(820px, 96vw);
    height: 170px;
    background: radial-gradient(circle at 50% 40%,
      rgba(255,255,255,.10),
      rgba(255,255,255,0) 62%);
    pointer-events:none;
    filter: blur(0.25px);
  }

  .piv-sec-title-d__h2{
    margin: 0;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.10;
    font-size: clamp(30px, 2.25vw, 36px);
    color: rgba(255,255,255,.96);
    text-wrap: balance;
  }

  /* 3 Ferrari dots row */
  .piv-sec-title-d__dots{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    height: 16px;
    margin: 14px auto 0;
    pointer-events: none;
  }
  .piv-sec-title-d__dot{
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: var(--piv-red);
    box-shadow: 0 0 0 1px rgba(255,40,0,.18), 0 12px 22px rgba(255,40,0,.12);
    opacity: 0;
    transform: translate(var(--x), var(--y)) scale(1.85);
    will-change: transform, opacity;
  }

  /* Animation triggers when section is in view */
  .piv-sec-title-d.is-inview .piv-sec-title-d__dot{
    animation: pivDotsDock 1050ms cubic-bezier(.22,.92,.25,1) both;
  }
  .piv-sec-title-d.is-inview .piv-sec-title-d__dot:nth-child(2){ animation-delay: 110ms; }
  .piv-sec-title-d.is-inview .piv-sec-title-d__dot:nth-child(3){ animation-delay: 220ms; }

  @keyframes pivDotsDock{
    0%   { opacity: 0; transform: translate(var(--x), var(--y)) scale(1.85); }
    40%  { opacity: 1; transform: translate(calc(var(--x) * .35), calc(var(--y) * .35)) scale(1.20); }
    72%  { opacity: 1; transform: translate(0,0) scale(.96); }
    100% { opacity: 1; transform: translate(0,0) scale(1); } /* final = stable, no drift */
  }

  /* Ferrari red streak */
  .piv-sec-title-d__streak{
    width: min(420px, 70vw);
    height: 5px;
    margin: 14px auto 14px;
    border-radius: 999px;
    background: linear-gradient(90deg,
      rgba(255,40,0,1)    0%,
      rgba(255,40,0,.90) 45%,
      rgba(255,40,0,.55) 72%,
      rgba(255,40,0,0)   100%);
    box-shadow: 0 0 0 1px rgba(255,40,0,.22), 0 10px 24px rgba(255,40,0,.14);
  }

  .piv-sec-title-d__sub{
    margin: 0 auto;
    max-width: 62ch;
    font-size: 16px;
    line-height: 1.55;
    color: var(--piv-sub);
    text-wrap: pretty;
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce){
    .piv-sec-title-d__dot{
      opacity: 1 !important;
      transform: translate(0,0) scale(1) !important;
      animation: none !important;
    }
  }
</style></head>
	<body><code></code><!-- PivotIQ.Ai — Section Title Block (DESKTOP-ONLY + 3 Ferrari Red Dots Animation)
     ✅ Desktop focused
     ✅ Transparent background
     ✅ DM Sans
     ✅ Ferrari red streak
     ✅ 3 Ferrari-red dots animate when section comes into view (replays on re-entry)
     ✅ UPDATED: padding is now 44px 16px 26px
-->



<section class="piv-sec-title-d is-inview" aria-label="Where we deliver measurable outcomes (desktop)" data-piv-observed="1">
  <div class="piv-sec-title-d__wrap">
    <h2 class="piv-sec-title-d__h2">Where We Deliver Measurable Outcomes</h2>

    <!-- 3 Ferrari dots (animate + settle) -->
    <div class="piv-sec-title-d__dots" aria-hidden="true">
      <span class="piv-sec-title-d__dot" style="--x:-34px; --y:-12px;"></span>
      <span class="piv-sec-title-d__dot" style="--x:0px;   --y:18px;"></span>
      <span class="piv-sec-title-d__dot" style="--x:30px;  --y:-10px;"></span>
    </div>

    <div class="piv-sec-title-d__streak" aria-hidden="true"></div>
    <p class="piv-sec-title-d__sub">We confirm targets in the first working session; ranges vary by scope.</p>
  </div>
</section>


<script>
(() => {
  const el = document.querySelector(".piv-sec-title-d");
  if (!el || el.dataset.pivObserved === "1") return;
  el.dataset.pivObserved = "1";

  // Reduced motion: keep dots visible, skip observer toggling
  if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
    el.classList.add("is-inview");
    return;
  }

  const setState = (inView) => {
    if (inView) el.classList.add("is-inview");
    else el.classList.remove("is-inview"); // replay on re-entry
  };

  if ("IntersectionObserver" in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => setState(e.isIntersecting));
    }, { threshold: 0.55 });
    io.observe(el);
  } else {
    // Fallback: play once
    el.classList.add("is-inview");
  }
})();
</script>
<script>
	const heightObserver = new ResizeObserver(([{ contentRect }]) => {
		window.parent.postMessage({ action: 'iframeHeightUpdated', height: contentRect.height, id: 'zScUUf' }, '*');
	});

	heightObserver.observe(document.documentElement);
</script>

</body></html>
