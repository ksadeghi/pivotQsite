<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<style>
	html {
		overflow: hidden;
	}

	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
 	}

 	iframe {
 		max-width: 100%;
 	}
</style>
</head>
	<body><code>Y</code><!-- Our AI Consulting Services — Navy Background Use (WHITE text) + Ferrari Red Streak + Subline (INLINE / Hostinger-safe / DM Sans) -->
<section style="
  background:transparent !important;
  width:100%;
  padding:22px 12px 16px;
  box-sizing:border-box;
  font-family:'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
">
  <div style="max-width:1120px; margin:0 auto; padding-left:0px;">
    <!-- Title (WHITE) -->
    <h1 style="
      margin:0;
      font-size:clamp(28px, 6.0vw, 40px);
      line-height:1.12;
      letter-spacing:-0.02em;
      color:rgba(255,255,255,.96);
    ">
      Our AI Consulting Services
    </h1>

    <!-- Ferrari red streak (unchanged) -->
    <div style="
      width:min(640px, 92vw);
      height:4px;
      margin-top:10px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(255,40,0,.98), rgba(255,40,0,.98), rgba(255,40,0,.36), rgba(255,40,0,0));
      box-shadow:0 0 0 1px rgba(255,40,0,.10);
    "></div>

    <!-- Subline (WHITE, slightly muted for hierarchy) -->
    <p style="
      margin:10px 0 0;
      max-width:72ch;
      font-size:clamp(14px, 2.6vw, 16px);
      line-height:1.55;
      letter-spacing:-0.01em;
      color:rgba(255,255,255,.82);
    ">
      Transforming Business Operations Through Intelligent Cloud &amp; AI Solutions.
    </p>
  </div>
</section>

<script>
	const heightObserver = new ResizeObserver(([{ contentRect }]) => {
		window.parent.postMessage({ action: 'iframeHeightUpdated', height: contentRect.height, id: 'zSW7Do' }, '*');
	});

	heightObserver.observe(document.documentElement);
</script>

</body></html>
