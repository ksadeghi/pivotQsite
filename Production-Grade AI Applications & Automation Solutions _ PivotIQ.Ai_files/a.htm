<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<style>
	html {
		overflow: hidden;
	}

	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
 	}

 	iframe {
 		max-width: 100%;
 	}
</style>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap');

  :root{
    --piv-red:#FF2800;
    --piv-white: rgba(255,255,255,.96);
  }

  .piv-hero-text{
    position: relative;
    background: transparent !important;
    width: 100%;
    padding: clamp(18px, 4.6vw, 64px) max(16px, env(safe-area-inset-right))
             clamp(16px, 5.0vw, 54px) max(16px, env(safe-area-inset-left));
    box-sizing: border-box !important;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
    overflow: visible;
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
  }
  .piv-hero-text, .piv-hero-text *{ box-sizing:border-box; }

  .piv-hero-text__wrap{
    max-width: 1040px;
    margin: 0 auto;
    font-family: "DM Sans", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    position: relative;
    z-index: 2;
  }

  .piv-hero-text__title{
    margin: 0;
    color: rgba(255,255,255,.98);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.04;
    font-size: clamp(36px, 6.2vw, 74px);
    text-shadow: 0 2px 18px rgba(0,0,0,.26), 0 1px 2px rgba(0,0,0,.32);
    position: relative;
    overflow: visible;
  }

  .piv-hero-text__line{
    display:block;
    margin: 0 0 12px 0;
    white-space: normal;
    position: relative;
    z-index: 1;
  }
  .piv-hero-text__line:last-child{ margin-bottom: 0; }

  .piv-hero-text__line--1{ padding-left: 0; }
  .piv-hero-text__line--2{ padding-left: clamp(10px, 2.0vw, 18px); }
  .piv-hero-text__line--3{ padding-left: clamp(18px, 3.2vw, 34px); }

  .piv-dotwrap{
    display:inline-block;
    position: relative;
    margin-left: .03em;
    vertical-align: baseline;
    line-height: 1;
    white-space: nowrap;
  }
  .piv-dotghost{
    opacity: 0;
    display:inline-block;
    font: inherit;
    line-height: 1;
    transform: translateY(-0.02em);
  }

  @media (max-width: 900px) and (orientation: landscape){
    .piv-hero-text{
      padding: clamp(12px, 2.2vw, 22px) max(16px, env(safe-area-inset-right))
               clamp(12px, 2.4vw, 22px) max(16px, env(safe-area-inset-left));
    }
    .piv-hero-text__wrap{ max-width: 860px; }
    .piv-hero-text__title{
      font-size: clamp(32px, 5.2vw, 48px);
      line-height: 1.06;
    }
  }

  .piv-viewport-dots{
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    visibility: hidden;
    transition: opacity 200ms ease, visibility 200ms ease;
  }
  .piv-viewport-dots.is-active{
    opacity: 1;
    visibility: visible;
  }
  .piv-floatdot{
    position: fixed;
    left: 0;
    top: 0;
    border-radius: 999px;
    will-change: transform, opacity, width, height;
    transform: translate3d(-9999px, -9999px, 0);
  }

  @media (prefers-reduced-motion: reduce){
    .piv-viewport-dots{ display:none !important; }
    .piv-dotghost{ opacity: 1; }
  }
</style></head>
	<body><code></code><!-- PivotIQ.Ai — HERO HEADLINE (MOBILE + DESKTOP) — paragraph removed -->



<section class="piv-hero-text" aria-label="Hero headline" id="pivHeroSection">
  <div class="piv-hero-text__wrap">
    <h1 class="piv-hero-text__title" id="pivHeroTitle">
      <span class="piv-hero-text__line piv-hero-text__line--1">
        AI Solutions<span class="piv-dotwrap" aria-hidden="true"><span class="piv-dotghost">.</span></span>
      </span>
      <span class="piv-hero-text__line piv-hero-text__line--2">
        Real Impact<span class="piv-dotwrap" aria-hidden="true"><span class="piv-dotghost">.</span></span>
      </span>
      <span class="piv-hero-text__line piv-hero-text__line--3">
        Lasting Value<span class="piv-dotwrap" aria-hidden="true"><span class="piv-dotghost">.</span></span>
      </span>
    </h1>
  </div>
</section>

<script>
(function(){
  function removeEmbedPlaceholderText(){
    const RE = /^(custom|customer)\s+embed\s+code\s+here\.?$/i;
    const candidates = Array.from(document.querySelectorAll('p,div,span'));
    for (const el of candidates){
      if (!el || el.children.length) continue;
      const t = (el.textContent || '').trim();
      if (RE.test(t)) el.remove();
    }
  }

  function init(){
    removeEmbedPlaceholderText();

    const reduceMQ = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (reduceMQ.matches) return;

    const section = document.getElementById('pivHeroSection');
    const title   = document.getElementById('pivHeroTitle');
    if (!section || !title) return;

    const cs = window.getComputedStyle(section);
    if (cs.display === 'none' || cs.visibility === 'hidden' || cs.opacity === '0') return;

    const ghosts = [
      title.querySelector('.piv-hero-text__line--1 .piv-dotghost'),
      title.querySelector('.piv-hero-text__line--2 .piv-dotghost'),
      title.querySelector('.piv-hero-text__line--3 .piv-dotghost')
    ];

    const RED = '#FF2800';
    const WHITE = '#FFFFFF';

    const isDesktop = window.matchMedia('(min-width: 901px)').matches;

    const DOTS_PER_TARGET = isDesktop ? 8 : 7;
    const DOTS_TOTAL = DOTS_PER_TARGET * 3;

    const CHAOS_MS = isDesktop ? 2200 : 2400;
    const DOCK_MS  = 1000;

    const DAMPING = 0.94;
    const ATTRACT = 0.008;
    const MAX_SPEED = 1.9;

    const WAYPOINT_MIN = 900;
    const WAYPOINT_MAX = 1500;

    const WANDER_FORCE = 0.22;
    const WANDER_OMEGA_MIN = 0.008;
    const WANDER_OMEGA_MAX = 0.018;

    const PAD_X = 14, PAD_Y = 12;
    const ROAM_PAD_X = 22;
    const ROAM_PAD_Y = isDesktop ? 76 : 56;

    const easeInOut = t => (t < 0.5) ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2;
    const smoothstep = t => t*t*(3 - 2*t);

    let layer = document.getElementById('pivViewportDotsLayer');
    if (!layer){
      layer = document.createElement('div');
      layer.id = 'pivViewportDotsLayer';
      layer.className = 'piv-viewport-dots';
      document.body.appendChild(layer);
    }

    let dots = [];
    let S = [];
    let rafId = null;
    let mode = 'idle';
    let startTs = 0;
    let dockStartTs = 0;
    let needsRestart = true;

    function clearRAF(){ if (rafId) cancelAnimationFrame(rafId); rafId = null; }
    function rand(min, max){ return min + Math.random() * (max - min); }
    function clamp(v, a, b){ return Math.min(Math.max(v, a), b); }

    function bounds(){
      const w = window.innerWidth || document.documentElement.clientWidth;
      const h = window.innerHeight || document.documentElement.clientHeight;

      const r = section.getBoundingClientRect();

      let minX = clamp(r.left + ROAM_PAD_X, PAD_X, w - PAD_X - 1);
      let maxX = clamp(r.right - ROAM_PAD_X, PAD_X + 1, w - PAD_X);
      let minY = clamp(r.top - ROAM_PAD_Y, PAD_Y, h - PAD_Y - 1);
      let maxY = clamp(r.bottom + ROAM_PAD_Y, PAD_Y + 1, h - PAD_Y);

      if (minX >= maxX){ minX = PAD_X; maxX = w - PAD_X; }
      if (minY >= maxY){ minY = PAD_Y; maxY = h - PAD_Y; }

      return { w, h, minX, maxX, minY, maxY };
    }

    function anchorFromGhost(idx){
      const g = ghosts[idx];
      if (!g) return null;
      const gr = g.getBoundingClientRect();
      return { x: gr.left + gr.width * 0.5 + 0.6, y: gr.top + gr.height * 0.78 };
    }

    function placeDot(i){
      const s = S[i];
      const d = dots[i];
      d.style.transform = `translate3d(${(s.x - s.size/2).toFixed(2)}px, ${(s.y - s.size/2).toFixed(2)}px, 0)`;
      d.style.opacity = s.opacity.toFixed(3);
      d.style.width = s.size.toFixed(2) + 'px';
      d.style.height = s.size.toFixed(2) + 'px';
      d.style.background = s.color;
    }

    function buildDots(){
      layer.innerHTML = '';
      const frag = document.createDocumentFragment();
      dots = []; S = [];

      const sizeMin = isDesktop ? 14 : 12;
      const sizeMax = isDesktop ? 22 : 20;

      for (let i=0; i<DOTS_TOTAL; i++){
        const d = document.createElement('span');
        d.className = 'piv-floatdot';

        const isRed = (Math.random() < 0.40);
        const size = rand(sizeMin, sizeMax);

        frag.appendChild(d);
        dots.push(d);

        S.push({
          x: 0, y: 0,
          vx: rand(-1.0, 1.0), vy: rand(-1.0, 1.0),
          wFromX: 0, wFromY: 0, wToX: 0, wToY: 0, wT0: 0, wDur: 1000,
          group: Math.min(2, Math.floor(i / DOTS_PER_TARGET)),
          ang: rand(0, Math.PI*2),
          angV: rand(WANDER_OMEGA_MIN, WANDER_OMEGA_MAX) * (Math.random()<0.5 ? -1 : 1),
          color: isRed ? RED : WHITE,
          opacity: isRed ? rand(0.62, 0.78) : rand(0.72, 0.88),
          size
        });
      }
      layer.appendChild(frag);
    }

    function newWaypoint(s, nowMs, b){
      s.wFromX = s.wToX || rand(b.minX, b.maxX);
      s.wFromY = s.wToY || rand(b.minY, b.maxY);
      s.wToX   = rand(b.minX, b.maxX);
      s.wToY   = rand(b.minY, b.maxY);
      s.wT0    = nowMs;
      s.wDur   = rand(WAYPOINT_MIN, WAYPOINT_MAX);
    }

    function waypointPos(s, nowMs){
      const t = Math.min(1, (nowMs - s.wT0) / s.wDur);
      const e = smoothstep(t);
      return {
        x: s.wFromX + (s.wToX - s.wFromX) * e,
        y: s.wFromY + (s.wToY - s.wFromY) * e,
        done: t >= 1
      };
    }

    function initRoam(now){
      buildDots();
      const b = bounds();
      for (let i=0; i<S.length; i++){
        const s = S[i];
        s.x = rand(b.minX, b.maxX);
        s.y = rand(b.minY, b.maxY);
        s.vx = rand(-1.0, 1.0);
        s.vy = rand(-1.0, 1.0);
        newWaypoint(s, now, b);
        placeDot(i);
      }
      layer.classList.add('is-active');
      mode = 'roam';
      startTs = now;
      dockStartTs = 0;
    }

    function startDock(now){
      mode = 'dock';
      dockStartTs = now;

      const A = [anchorFromGhost(0), anchorFromGhost(1), anchorFromGhost(2)];
      for (let i=0; i<S.length; i++){
        const s = S[i];
        const a = A[s.group];
        s.dockAx = a ? a.x : s.x;
        s.dockAy = a ? a.y : s.y;
        s.dockSx = s.x;
        s.dockSy = s.y;

        s.color = RED;
        s.opacity = 0.98;
      }
    }

    function clampToBounds(s, b){
      s.x = Math.min(Math.max(s.x, b.minX), b.maxX);
      s.y = Math.min(Math.max(s.y, b.minY), b.maxY);
    }

    function tick(ts){
      const b = bounds();

      if (mode === 'roam'){
        for (let i=0; i<S.length; i++){
          const s = S[i];
          const wp = waypointPos(s, ts);
          if (wp.done) newWaypoint(s, ts, b);

          s.ang += s.angV;
          const wx = Math.cos(s.ang) * WANDER_FORCE;
          const wy = Math.sin(s.ang) * WANDER_FORCE;

          s.vx = (s.vx * DAMPING) + ((wp.x - s.x) * ATTRACT) + wx;
          s.vy = (s.vy * DAMPING) + ((wp.y - s.y) * ATTRACT) + wy;

          const spd = Math.hypot(s.vx, s.vy);
          if (spd > MAX_SPEED){
            s.vx = (s.vx / spd) * MAX_SPEED;
            s.vy = (s.vy / spd) * MAX_SPEED;
          }

          s.x += s.vx;
          s.y += s.vy;
          clampToBounds(s, b);
          placeDot(i);
        }

        if ((ts - startTs) >= CHAOS_MS) startDock(ts);
      }

      else if (mode === 'dock'){
        const t = Math.min(1, (ts - dockStartTs) / DOCK_MS);
        const e = easeInOut(t);

        for (let i=0; i<S.length; i++){
          const s = S[i];
          const spread = ((i % DOTS_PER_TARGET) - (DOTS_PER_TARGET - 1)/2) * 1.02;

          const targetX = s.dockAx + spread;
          const targetY = s.dockAy + spread * 0.22;

          s.x = s.dockSx + (targetX - s.dockSx) * e;
          s.y = s.dockSy + (targetY - s.dockSy) * e;

          const finalSize = 9;
          const startSize = s.size;
          s.size = startSize + (finalSize - startSize) * e;

          s.opacity = 0.98;
          placeDot(i);
        }

        if (t >= 1){
          for (let g=0; g<3; g++){
            const keep = g * DOTS_PER_TARGET;
            for (let k=0; k<DOTS_PER_TARGET; k++){
              const idx = g * DOTS_PER_TARGET + k;
              if (!S[idx]) continue;

              if (idx !== keep){
                S[idx].opacity = 0;
              } else {
                S[idx].x = S[idx].dockAx;
                S[idx].y = S[idx].dockAy;
                S[idx].size = 9;
                S[idx].opacity = 1;
                S[idx].color = RED;
              }
              placeDot(idx);
            }
          }

          mode = 'idle';
          clearRAF();
          return;
        }
      }

      if (layer.classList.contains('is-active')) rafId = requestAnimationFrame(tick);
      else clearRAF();
    }

    function isSectionVisible(){
      const r = section.getBoundingClientRect();
      const vh = window.innerHeight || document.documentElement.clientHeight;
      const visiblePx = Math.min(vh, r.bottom) - Math.max(0, r.top);
      return visiblePx > Math.min(140, r.height * 0.30);
    }

    function start(){
      if (!needsRestart) return;
      needsRestart = false;
      const now = performance.now();
      initRoam(now);
      clearRAF();
      rafId = requestAnimationFrame(tick);
    }

    function stop(){
      layer.classList.remove('is-active');
      clearRAF();
      needsRestart = true;
      mode = 'idle';
    }

    if (isSectionVisible()) start();

    if ('IntersectionObserver' in window){
      const io = new IntersectionObserver((entries) => {
        const e = entries[0];
        if (!e) return;
        if (e.isIntersecting) start();
        else stop();
      }, { threshold: [0.01, 0.15, 0.30] });
      io.observe(section);
    } else {
      window.addEventListener('scroll', () => (isSectionVisible() ? start() : stop()), { passive:true });
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stop();
      else if (isSectionVisible()) start();
    });

    window.addEventListener('resize', () => {
      if (!layer.classList.contains('is-active')) return;

      if (mode === 'idle' && S.length){
        const A = [anchorFromGhost(0), anchorFromGhost(1), anchorFromGhost(2)];
        for (let g=0; g<3; g++){
          const keep = g * DOTS_PER_TARGET;
          if (!S[keep] || !A[g]) continue;
          S[keep].x = A[g].x;
          S[keep].y = A[g].y;
          placeDot(keep);
        }
      } else if (mode !== 'idle' && !rafId){
        rafId = requestAnimationFrame(tick);
      }
    }, { passive:true });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
<script>
	const heightObserver = new ResizeObserver(([{ contentRect }]) => {
		window.parent.postMessage({ action: 'iframeHeightUpdated', height: contentRect.height, id: 'zUK_SS' }, '*');
	});

	heightObserver.observe(document.documentElement);
</script>

</body></html>
